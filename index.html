<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふぃーくんといちご畑の習慣化アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:         #FCF8F7;
  --card:       #FFFCFB;
  --border:     #EFE4DF;
  --text-main:  #7E6D66;
  --text-sub:   #B6AAA4;
  --accent-pink:#FEEEF3;
  --accent-peach:#FFF0EA;
  --accent-mint:#EAF3EC;
  --accent-yellow:#FFF9ED;
  --pink-dark:  #D98FA2;
  --line:       #8D7B74;
}

body {
  background: #EDE5E0;
  font-family: 'M PLUS Rounded 1c','Noto Sans JP',sans-serif;
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.phone-wrap {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* ── STATUS BAR ── */
.status-bar {
  height: 44px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-main);
}
.status-right { display:flex; gap:5px; align-items:center; }

/* ── HEADER ── */
.header {
  background: var(--bg);
  padding: 6px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.header-left { display:flex; align-items:center; gap:8px; }
.header-title { font-size:14px; font-weight:700; color:var(--text-main); letter-spacing:.02em; }

.header-icons { display:flex; gap:10px; align-items:center; }
.header-icon {
  width:34px; height:34px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 6px rgba(200,180,170,.10);
}

/* ── SCROLL AREA ── */
.scroll-area {
  padding: 18px 16px 96px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── CARD BASE ── */
.card {
  background: var(--card);
  border: 1px solid #F2E8E3;
  border-radius: 28px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.9) inset,
    0 4px 12px rgba(210,190,180,.08);
  padding: 24px;
}

/* ── GREETING CARD ── */
.greeting-card {
  position: relative;
  overflow: hidden;
  min-height: 172px;
  padding: 24px 24px 20px;
}
.greeting-bg-blob {
  position:absolute; right:-40px; top:-50px;
  width:220px; height:220px;
  background: radial-gradient(circle at 60% 40%,
    rgba(255,210,225,.28) 0%,
    rgba(255,235,220,.18) 50%,
    transparent 75%);
  border-radius: 50%;
  pointer-events:none;
}
.greeting-date {
  font-size:11px; color:var(--text-sub); font-weight:400; margin-bottom:5px;
}
.greeting-text {
  font-size:17px; font-weight:700; color:var(--text-main); line-height:1.5; margin-bottom:3px;
}
.greeting-sub {
  font-size:12px; color:var(--text-sub); font-weight:400; margin-bottom:18px;
}

/* Letter bubble */
.letter-bubble {
  background: var(--accent-pink);
  border: 1px solid #F2D0DC;
  border-radius: 18px;
  padding: 11px 14px;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  position: relative;
  max-width: 195px;
}
.letter-bubble::after {
  content:'';
  position:absolute; bottom:-9px; left:22px;
  border:5px solid transparent;
  border-top-color:#F2D0DC;
}
.letter-bubble::before {
  content:'';
  position:absolute; bottom:-7px; left:23px;
  border:4px solid transparent;
  border-top-color:var(--accent-pink);
  z-index:1;
}
.letter-bubble-text {
  font-size:11px; color:var(--pink-dark); font-weight:700; line-height:1.5;
}

/* fii-kun image */
.fiikun-wrapper {
  position:absolute;
  right:-4px; bottom:-10px;
  width:138px; height:138px;
  pointer-events:none;
}
.fiikun-wrapper img {
  width:100%; height:100%;
  object-fit:contain;
  display:block;
}

/* ── FIELD ── */
.field-header { display:flex; align-items:center; gap:7px; margin-bottom:16px; }
.field-title { font-size:13px; font-weight:700; color:var(--text-main); }

.pots-row {
  display:flex; align-items:flex-end;
  justify-content:space-between;
  gap:4px; margin-bottom:14px;
}
.pot-wrap {
  display:flex; flex-direction:column; align-items:center; gap:1px; flex:1;
}
.pot-plant { height:36px; display:flex; align-items:flex-end; justify-content:center; }
.pot-svg { width:36px; }

.field-note {
  font-size:11px; color:var(--text-sub);
  text-align:center;
  padding-top:10px;
  border-top:1px dashed #EDE0D8;
  line-height:1.6;
}
.field-note em { color:var(--pink-dark); font-style:normal; font-weight:700; }

/* ── TASK ── */
.task-tabs { display:flex; gap:5px; margin-bottom:16px; align-items:center; }
.tab {
  padding:5px 13px; border-radius:20px;
  font-size:12px; font-weight:700;
  border:1.5px solid var(--border);
  background:transparent; color:var(--text-sub); cursor:default;
}
.tab.active {
  background:var(--text-main); color:#fff; border-color:var(--text-main);
}
.task-add {
  margin-left:auto; padding:5px 10px; border-radius:20px;
  font-size:12px; font-weight:700;
  border:1.5px dashed var(--border);
  background:transparent; color:var(--text-sub); cursor:default;
}
.task-section-label {
  font-size:10px; font-weight:700; color:var(--text-sub);
  letter-spacing:.1em; margin:12px 0 8px;
  text-transform:uppercase;
  display:flex; align-items:center; gap:6px;
}
.task-section-label::after {
  content:''; flex:1; height:1px; background:var(--border);
}

.task-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 0;
  border-bottom:1px solid #F5EDE8;
}
.task-item:last-child { border-bottom:none; }
.task-check {
  width:20px; height:20px; border-radius:50%;
  border:1.5px solid #D8C8C0;
  flex-shrink:0; background:var(--card);
}
.task-text { flex:1; font-size:13px; font-weight:500; color:var(--text-main); line-height:1.4; }
.task-time { font-size:11px; color:var(--text-sub); flex-shrink:0; }
.task-tag {
  font-size:10px; font-weight:700; padding:3px 9px;
  border-radius:12px; flex-shrink:0;
}
.tag-dance  { background:#FDE8F0; color:#C07090; }
.tag-diet   { background:#FFF0EA; color:#C0886A; }
.tag-lang   { background:#E7F3EB; color:#5A9870; }
.tag-hobby  { background:#FFF8E5; color:#AA8830; }
.tag-toeic  { background:#EEEEF8; color:#7878C0; }
.tag-health { background:#FDE8F0; color:#C07090; }
.tag-diary  { background:#FFF8E5; color:#AA8830; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background:var(--card);
  border-top:1px solid var(--border);
  padding:8px 0 24px;
  display:flex; justify-content:space-around; align-items:center;
  z-index:100;
  box-shadow:0 -2px 16px rgba(200,180,170,.12);
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; cursor:default;
}
.nav-icon {
  width:46px; height:32px;
  display:flex; align-items:center; justify-content:center;
  border-radius:18px;
}
.nav-item.active .nav-icon { background:var(--accent-pink); }
.nav-label { font-size:10px; color:var(--text-sub); font-weight:500; }
.nav-item.active .nav-label { color:var(--pink-dark); font-weight:700; }
</style>
</head>
