<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ふぃーくん ホーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #fffaf6;
      --card: #fffdf8;
      --line: #eaded4;
      --line-soft: #f2e9df;
      --ink: #574a40;
      --muted: #9b8c81;
      --pink: #e99694;
      --pink-soft: #fff0ee;
      --green-soft: #eef7ee;
      --shadow: 0 7px 18px rgba(164, 129, 105, .08);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #fbf6ef;
      color: var(--ink);
      font-family: "M PLUS Rounded 1c", system-ui, sans-serif;
      letter-spacing: .02em;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .phone {
      width: min(100vw, 430px);
      max-width: 430px;
      min-height: 100vh;
      background: var(--paper);
      position: relative;
      overflow: hidden;
    }

    .screen {
      width: min(100vw, 390px);
      min-height: 844px;
      margin: 0 auto;
      padding: 0 14px 82px;
      position: relative;
      background: var(--paper);
    }

    .status-bar {
      height: 32px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 8px 8px 3px;
      font-size: 13px;
      font-weight: 700;
      color: #493d35;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #5a4b42;
      font-size: 12px;
      font-weight: 700;
    }

    .battery {
      width: 22px;
      height: 10px;
      border: 1.6px solid #5a4b42;
      border-radius: 3px;
      position: relative;
    }

    .battery::before {
      content: "";
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      border-radius: 0 2px 2px 0;
      background: #5a4b42;
    }

    .battery::after {
      content: "";
      position: absolute;
      inset: 2px 4px 2px 2px;
      border-radius: 2px;
      background: #5a4b42;
    }

    .top {
      height: 47px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 6px 8px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: .05em;
    }

    .header-mark {
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #caa99b;
      font-size: 16px;
      background: rgba(255, 252, 247, .9);
    }

    .card {
      background: rgba(255, 253, 248, .92);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .greeting {
      height: 166px;
      padding: 16px 17px;
      position: relative;
      overflow: hidden;
    }

    .greeting h2,
    .section-title {
      margin: 0;
      font-size: 13px;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .greeting p {
      margin: 5px 0 0;
      font-size: 11px;
      line-height: 1.45;
      font-weight: 700;
    }

    .message {
      position: absolute;
      left: 31px;
      top: 69px;
      width: 140px;
      height: 61px;
      border: 1.4px dashed #e2c9b5;
      border-radius: 24px;
      transform: rotate(-3deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      color: #756459;
      background: rgba(255, 253, 248, .63);
      font-size: 9px;
      font-weight: 700;
      line-height: 1.35;
    }

    .mail {
      width: 29px;
      height: 21px;
      border: 1px solid #d7beb0;
      border-radius: 4px;
      background: #fff7ef;
      color: var(--pink);
      display: grid;
      place-items: center;
      font-size: 12px;
      line-height: 1;
    }

    .fiikun {
      position: absolute;
      right: 21px;
      bottom: 6px;
      width: 119px;
      height: auto;
      z-index: 1;
    }

    .pot {
      position: absolute;
      right: 135px;
      bottom: 24px;
      width: 25px;
      height: 32px;
      object-fit: cover;
      object-position: 44% 48%;
    }

    .field {
      height: 92px;
      margin-top: 10px;
      padding: 12px 12px 9px;
      overflow: hidden;
    }

    .field img {
      display: block;
      width: 100%;
      margin-top: 7px;
    }

    .tasks {
      margin-top: 12px;
    }

    .tabs {
      height: 28px;
      margin-top: 8px;
      display: grid;
      grid-template-columns: 53px 1fr 1fr 1fr 51px;
      gap: 6px;
    }

    .tab,
    .add {
      border: 1px solid var(--line-soft);
      background: rgba(255, 253, 248, .86);
      border-radius: 9px;
      color: #8a7a70;
      font-size: 11px;
      line-height: 26px;
      text-align: center;
      box-shadow: 0 3px 8px rgba(168, 130, 103, .05);
    }

    .tab.active {
      background: #fff5f3;
      color: #b26e6d;
      font-weight: 700;
    }

    .list-card {
      margin-top: 7px;
      padding: 8px 11px 7px;
    }

    .label {
      margin: 0 0 6px;
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
      color: #d19699;
    }

    .task-row {
      height: 25px;
      display: grid;
      grid-template-columns: 19px 1fr auto;
      align-items: center;
      border-top: 1px solid rgba(238, 225, 214, .7);
      font-size: 12px;
      font-weight: 500;
      color: #5e5148;
    }

    .task-row:first-of-type { border-top: 0; }

    .circle {
      width: 12px;
      height: 12px;
      border: 1.6px solid #81746b;
      border-radius: 50%;
    }

    .minutes {
      margin-left: 9px;
      white-space: nowrap;
    }

    .pill {
      min-width: 44px;
      height: 18px;
      padding: 0 8px;
      border-radius: 9px;
      background: #fff1ed;
      color: #b9857c;
      display: grid;
      place-items: center;
      font-size: 9px;
      font-weight: 700;
    }

    .pill.purple { background: #f7f0f8; color: #967a9f; }
    .pill.green { background: #eff7ef; color: #8a9a77; }
    .pill.blue { background: #eef6f8; color: #7b949a; }

    .nav {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 11px;
      height: 62px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      padding: 4px 7px 5px;
      background: rgba(255, 253, 248, .96);
      border: 1px solid var(--line);
      border-radius: 17px;
      box-shadow: 0 -2px 16px rgba(164, 129, 105, .06);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #8a7c72;
      font-size: 8px;
      font-weight: 700;
      line-height: 1.1;
    }

    .nav-item.active { color: #e39293; }

    .nav-item img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    @media (min-width: 431px) {
      body { padding: 22px 0; }
      .phone {
        min-height: 844px;
        border-radius: 24px;
        box-shadow: 0 18px 48px rgba(117, 83, 61, .12);
      }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="screen">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <span>◜◝</span>
          <span>5G</span>
          <span class="battery"></span>
        </div>
      </div>

      <header class="top">
        <h1>ホーム</h1>
        <div class="header-mark">♡</div>
      </header>

      <section class="card greeting">
        <h2>おはよう、みおさん</h2>
        <p>今日もいっしょにがんばろうね！♧</p>
        <div class="message">
          <span>ふぃーくんからの</span>
          <span>おてがみが届いているよ</span>
          <span class="mail">♡</span>
        </div>
        <img class="pot" src="assets/strawberry-field.png" alt="">
        <img class="fiikun" src="assets/fiikun-normal.png" alt="ふぃーくん">
      </section>

      <section class="card field">
        <h2 class="section-title">今日のいちご畑</h2>
        <img src="assets/strawberry-field.png" alt="今日のいちご畑">
      </section>

      <section class="tasks">
        <h2 class="section-title">今日のタスク</h2>
        <div class="tabs" aria-hidden="true">
          <div class="tab active">すべて</div>
          <div class="tab">Main</div>
          <div class="tab">Sub</div>
          <div class="tab">Tiny</div>
          <div class="add">＋追加</div>
        </div>

        <div class="card list-card">
          <p class="label">Main</p>
          <div class="task-row">
            <span class="circle"></span>
            <span>ベリーダンス基礎練習 <span class="minutes">20分</span></span>
            <span class="pill">ダンス</span>
          </div>
          <div class="task-row">
            <span class="circle"></span>
            <span>ダイエット：夜ごはん記録</span>
            <span class="pill">ダイエット</span>
          </div>
          <div class="task-row">
            <span class="circle"></span>
            <span>韓国語リスニング <span class="minutes">15分</span></span>
            <span class="pill purple">韓国語</span>
          </div>
        </div>

        <div class="card list-card">
          <p class="label">Sub</p>
          <div class="task-row">
            <span class="circle"></span>
            <span>TOEIC 単語 <span class="minutes">20分</span></span>
            <span class="pill purple">TOEIC</span>
          </div>
          <div class="task-row">
            <span class="circle"></span>
            <span>編み物 <span class="minutes">30分</span></span>
            <span class="pill purple">趣味</span>
          </div>
        </div>

        <div class="card list-card">
          <p class="label">Tiny</p>
          <div class="task-row">
            <span class="circle"></span>
            <span>ストレッチ <span class="minutes">5分</span></span>
            <span class="pill green">美容・健康</span>
          </div>
          <div class="task-row">
            <span class="circle"></span>
            <span>和菓子日記 <span class="minutes">1ページ</span></span>
            <span class="pill blue">日記</span>
          </div>
        </div>
      </section>

      <nav class="nav" aria-label="下部ナビゲーション">
        <div class="nav-item active"><img src="assets/icon-home.png" alt=""><span>ホーム</span></div>
        <div class="nav-item"><img src="assets/icon-task.png" alt=""><span>タスク</span></div>
        <div class="nav-item"><img src="assets/icon-timer.png" alt=""><span>タイマー</span></div>
        <div class="nav-item"><img src="assets/icon-goal.png" alt=""><span>目標</span></div>
        <div class="nav-item"><img src="assets/icon-record.png" alt=""><span>記録</span></div>
        <div class="nav-item"><img src="assets/icon-reward.png" alt=""><span>ごほうび</span></div>
      </nav>
    </div>
  </main>
</body>
</html>
