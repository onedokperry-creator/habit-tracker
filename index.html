<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

        /* --- デザインシステム & リセット --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #F9F6F0; /* PC背景は少しトーンを落としてスマホ画面を際立たせる */
            font-family: "Zen Maru Gothic", "Noto Sans JP", sans-serif;
            color: #6E5E58;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 画面サイズ・コンテナ（スマホファースト・PC中央寄せ） --- */
        .app-container {
            width: 100%;
             citizens-width: 375px;
            max-width: 430px;
            height: 100vh;
            max-height: 932px; /* 一般的なスマホ縦長画面 */
            background-color: #FCF8F6;
            border: 1px solid #E8DAD4;
            box-shadow: 0 8px 30px rgba(110, 94, 88, 0.06);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        /* スクロールバーの非表示（美観のため） */
        .app-container::-webkit-scrollbar {
            width: 0px;
        }

        /* --- メインコンテンツエリア --- */
        .main-content {
            flex: 1;
            padding: 24px 20px 100px 20px; /* 下部ナビ分の余白 */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- コンポーネント: 挨拶エリア --- */
        .greeting-section {
            padding: 4px 4px 0 4px;
        }
        .greeting-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: #6E5E58;
        }
        .greeting-subtitle {
            font-size: 13px;
            font-weight: 400;
            color: #A79A93;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- 共通カードスタイル --- */
        .card {
            background-color: #FFFDFB;
            border-radius: 24px;
            border: 1px solid #E8DAD4;
            box-shadow: 0 4px 12px rgba(110, 94, 88, 0.04);
            padding: 20px;
        }
